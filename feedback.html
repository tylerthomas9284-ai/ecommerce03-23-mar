<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit website, product, and service feedback to Clothiva.">
  <title>Feedback | Clothiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">Clothiva</span><span class="brand-note">USA Women's Fashion</span></a>
      <div class="nav-wrap" data-nav-wrap>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="contact.html">Contact</a>
          <a href="help.html">Help</a>
        </nav>
      </div>
      <button class="menu-toggle" type="button" data-menu-toggle>Menu</button>
    </div>
  </header>
  <section class="page-hero">
    <div class="page-hero-card">
      <p class="eyebrow">Feedback</p>
      <h1>Collect customer insight on products, service, and storefront experience.</h1>
      <p class="lead">This page gives shoppers a direct route to share input beyond standard support requests.</p>
    </div>
  </section>
  <main class="content-page">
    <section class="form-card">
      <form data-inline-form>
        <div class="field-grid">
          <label class="field">Name<input type="text" required></label>
          <label class="field">Email<input type="email" required></label>
        </div>
        <label class="field">Feedback Type<select required><option>Website experience</option><option>Product quality</option><option>Customer service</option><option>Payment experience</option></select></label>
        <label class="field">Your Feedback<textarea required></textarea></label>
        <button class="button primary" type="submit">Send Feedback</button>
      </form>
      <p class="form-message"></p>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
